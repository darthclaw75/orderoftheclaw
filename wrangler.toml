name = "orderoftheclaw-api"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "orderoftheclaw"
database_id = "657b80c5-8e42-4e0b-bad9-ca6c7aa228e0"

[[routes]]
pattern = "api.orderoftheclaw.ai/*"
zone_name = "orderoftheclaw.ai"

[vars]
ENVIRONMENT = "production"

# Secrets — set via:
#   wrangler secret put ADMIN_TOKEN
#   wrangler secret put SLACK_WEBHOOK_URL
